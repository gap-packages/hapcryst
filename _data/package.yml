name: HAPcryst
version: "0.2.0"
license: "GPL-2.0-or-later"
date: 2026-03-24
description: |
    A HAP extension for crystallographic groups

authors:
    - name: Marc Roeder
      url: mailto:roeder.marc@gmail.com

maintainers:
    - name: Marc Roeder
      url: mailto:roeder.marc@gmail.com
    - name: The GAP Team
      url: mailto:support@gap-system.org

GAP: ">=4.12"

needed-pkgs:
    - name: "Polycyclic"
      version: ">=2.8.1"
      url: "https://gap-packages.github.io/polycyclic/"
    - name: "AClib"
      version: ">=1.1"
      url: "https://gap-packages.github.io/aclib/"
    - name: "cryst"
      version: ">=4.1.5"
      url: "https://www.math.uni-bielefeld.de/~gaehler/gap/packages.php"
    - name: "HAP"
      version: ">=1.8"
      url: "https://gap-packages.github.io/hap"
    - name: "polymaking"
      version: ">=0.8.6"
      url: "https://gap-packages.github.io/polymaking/"

suggested-pkgs:
    - name: "Carat"
      version: ">=1.1"
    - name: "CrystCat"
      version: ">=1.1.2"
      url: "https://www.math.uni-bielefeld.de/~gaehler/gap/packages.php"
    - name: "GAPDoc"
      version: ">= 0.99"
      url: "https://www.math.rwth-aachen.de/~Frank.Luebeck/GAPDoc"

www: https://gap-packages.github.io/hapcryst/
readme: README.md
packageinfo: https://gap-packages.github.io/hapcryst/PackageInfo.g

downloads:
    - name: .tar.gz
      url: https://github.com/gap-packages/hapcryst/releases/download/v0.2.0/hapcryst-0.2.0.tar.gz

abstract: |
    This is an extension to the HAP package by Graham Ellis. It implements geometric methods for the calculation of resolutions of Bieberbach groups.

status: deposited
doc-html: doc/chap0_mj.html
doc-pdf: doc/manual.pdf
keywords: |
    homological algebra, crystallographic groups, resolution.
citeas: |
    <p class='BibEntry'>
    [<span class='BibKey'>RT26</span>]   <b class='BibAuthor'>Roeder, M. and GAP Team, T.</b>,
     <i class='BibTitle'>HAPcryst, A HAP extension for crystallographic groups,
             Version 0.2.0</i>
     (<span class='BibYear'>2026</span>)<br />
    (<span class='BibNote'>GAP package</span>),
    <span class='BibHowpublished'><a href="https://gap-packages.github.io/hapcryst/">https://gap-packages.github.io/hapcryst/</a></span>.
    </p>
    

bibtex: |
    @misc{ HAPcryst,
      author =           {Roeder, M. and GAP Team, T.},
      title =            {{HAPcryst},  {A  HAP  extension  for  crystallographic
                          groups}, {V}ersion 0.2.0},
      month =            {Mar},
      year =             {2026},
      note =             {GAP package},
      howpublished =     {\href       {https://gap-packages.github.io/hapcryst/}
                          {\texttt{https://gap\texttt{\symbol{45}}packages.github.io/}\discretionary
                          {}{}{}\texttt{hapcryst/}}},
      keywords =         {homological    algebra;    crystallographic    groups;
                          resolution},
      printedkey =       {RT26}
    }

